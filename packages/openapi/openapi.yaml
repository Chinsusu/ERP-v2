openapi: 3.1.0
info:
  title: ERP Platform API
  version: 0.1.0
  license:
    name: Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Get API health
      operationId: getHealth
      security: []
      tags:
        - system
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/mock-login:
    post:
      summary: Create a controlled mock auth session
      operationId: mockLogin
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Mock login accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      tags:
        - auth
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /rbac/roles:
    get:
      summary: List RBAC role catalog
      operationId: listRbacRoles
      tags:
        - auth
      responses:
        "200":
          description: RBAC role catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacRoleCatalogSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /inventory/stock-movements:
    post:
      summary: Record stock movement
      operationId: recordStockMovement
      tags:
        - inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementRequest"
      responses:
        "201":
          description: Stock movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /inventory/available-stock:
    get:
      summary: List available stock by warehouse, SKU, and batch
      operationId: listAvailableStock
      tags:
        - inventory
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: sku
          in: query
          required: false
          schema:
            type: string
        - name: batch_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Available stock rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableStockSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
    AuthLoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLoginResponse"
    AuthLoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_in:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserProfile"
    MeSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - permissions
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/RoleKey"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacRoleCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacRole"
        request_id:
          type: string
          example: req_lq7z2t9c
    RbacRole:
      type: object
      required:
        - key
        - name
        - permissions
      properties:
        key:
          $ref: "#/components/schemas/RoleKey"
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RoleKey:
      type: string
      enum:
        - CEO
        - ERP_ADMIN
        - WAREHOUSE_STAFF
        - WAREHOUSE_LEAD
        - QA
        - SALES_OPS
        - PRODUCTION_OPS
    PermissionKey:
      type: string
      enum:
        - dashboard:view
        - warehouse:view
        - inventory:view
        - purchase:view
        - qc:view
        - production:view
        - sales:view
        - shipping:view
        - returns:view
        - master-data:view
        - approvals:view
        - audit-log:view
        - reports:view
        - settings:view
        - record:create
        - record:export
    StockMovementRequest:
      type: object
      required:
        - movementId
        - sku
        - warehouseId
        - movementType
        - quantity
        - reason
      properties:
        movementId:
          type: string
        sku:
          type: string
        warehouseId:
          type: string
        movementType:
          type: string
          enum:
            - RECEIVE
            - ISSUE
            - TRANSFER_IN
            - ADJUST
        quantity:
          type: number
          exclusiveMinimum: 0
        reason:
          type: string
    AvailableStockSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AvailableStockItem"
    AvailableStockItem:
      type: object
      required:
        - warehouse_id
        - warehouse_code
        - sku
        - physical_stock
        - reserved_stock
        - hold_stock
        - available_stock
      properties:
        warehouse_id:
          type: string
        warehouse_code:
          type: string
        sku:
          type: string
        batch_id:
          type: string
        batch_no:
          type: string
        physical_stock:
          type: number
        reserved_stock:
          type: number
        hold_stock:
          type: number
        available_stock:
          type: number
    SuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        request_id:
          type: string
          example: req_lq7z2t9c
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - request_id
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
              example: Invalid request
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
              example: req_lq7z2t9c
