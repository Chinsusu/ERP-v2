        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for page-based pagination.
    PageSizeParam:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of records returned per page.
    SearchParam:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
      description: Quick search term for code, name, phone, or other whitelisted fields.
    MasterDataStatusParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/MasterDataStatus"
      description: Filter by master data lifecycle status.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - BATCH_NOT_SELLABLE
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
    AuthRefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthLoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLoginResponse"
    AuthLoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
        - refresh_expires_in
        - expires_at
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_in:
          type: integer
          minimum: 1
        refresh_expires_in:
          type: integer
          minimum: 1
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserProfile"
    AuthPolicySuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthPolicyResponse"
    AuthPolicyResponse:
      type: object
      required:
        - password_min_length
        - password_requires_letter
        - password_requires_number_or_symbol
        - common_passwords_blocked
        - max_failed_attempts
        - lockout_window_seconds
        - lockout_duration_seconds
      properties:
        password_min_length:
          type: integer
          minimum: 1
        password_requires_letter:
          type: boolean
        password_requires_number_or_symbol:
          type: boolean
        common_passwords_blocked:
          type: boolean
        max_failed_attempts:
          type: integer
          minimum: 1
        lockout_window_seconds:
          type: integer
          minimum: 1
        lockout_duration_seconds:
          type: integer
          minimum: 1
    MeSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - permissions
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/RoleKey"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
