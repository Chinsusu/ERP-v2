          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AuditLogItem"
    AuditLogItem:
      type: object
      required:
        - id
        - actor_id
        - action
        - entity_type
        - entity_id
        - metadata
        - created_at
      properties:
        id:
          type: string
        actor_id:
          type: string
        action:
          type: string
          example: inventory.stock_movement.adjusted
        entity_type:
          type: string
          example: inventory.stock_movement
        entity_id:
          type: string
        request_id:
          type: string
        before_data:
          type: object
          additionalProperties: true
        after_data:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    RoleKey:
      type: string
      enum:
        - CEO
        - ERP_ADMIN
        - WAREHOUSE_STAFF
        - WAREHOUSE_LEAD
        - QA
        - SALES_OPS
        - PRODUCTION_OPS
    PermissionKey:
      type: string
      enum:
        - dashboard:view
        - warehouse:view
        - inventory:view
        - purchase:view
        - qc:view
        - production:view
        - subcontract:view
        - sales:view
        - shipping:view
        - returns:view
        - master-data:view
        - approvals:view
        - audit-log:view
        - reports:view
        - settings:view
        - qc:decision
        - record:create
        - record:export
    Pagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total_items:
          type: integer
          minimum: 0
          example: 245
        total_pages:
          type: integer
          minimum: 0
          example: 13
    MoneyAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,2})?$"
      description: Decimal string for VND money amounts, stored as numeric(18,2).
      example: "1250000.00"
    UnitCostAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,6})?$"
      description: Decimal string for unit cost values, stored as numeric(18,6).
      example: "64000.000000"
    UnitPriceAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,4})?$"
      description: Decimal string for unit price values, stored as numeric(18,4).
      example: "125000.0000"
    Quantity:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,6})?$"
      description: Decimal string for quantities, stored as numeric(18,6).
      example: "10.500000"
    Rate:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,4})?$"
      description: Decimal string for rates or percentages, stored as numeric(9,4).
      example: "10.0000"
    CurrencyCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "^[A-Z]{3}$"
      default: VND
      example: VND
    UOMCode:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "^[A-Z0-9_-]+$"
      example: PCS
    BatchQCStatus:
      type: string
      enum:
        - hold
        - pass
        - fail
        - quarantine
        - retest_required
      description: Batch-level QC status used to decide whether stock may contribute to available quantity.
    BatchStatus:
