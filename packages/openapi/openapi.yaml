        - permissions
      properties:
        key:
          $ref: "#/components/schemas/RoleKey"
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacPermissionCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacPermission"
        request_id:
          type: string
          example: req_lq7z2t9c
