        - component_name
        - component_type
        - entered_qty
        - entered_uom_code
        - calc_qty
        - calc_uom_code
        - stock_base_qty
        - stock_base_uom_code
        - waste_percent
        - is_required
        - is_stock_managed
        - line_status
      properties:
        id:
          type: string
        line_no:
          type: integer
          minimum: 1
        component_item_id:
          type: string
        component_sku:
          type: string
          example: ACT_BAICAPIL
        component_name:
          type: string
          example: BAICAPIL
        component_type:
          $ref: "#/components/schemas/FormulaComponentType"
        entered_qty:
          $ref: "#/components/schemas/Quantity"
        entered_uom_code:
          $ref: "#/components/schemas/UOMCode"
        calc_qty:
          $ref: "#/components/schemas/Quantity"
        calc_uom_code:
          $ref: "#/components/schemas/UOMCode"
        stock_base_qty:
          $ref: "#/components/schemas/Quantity"
        stock_base_uom_code:
          $ref: "#/components/schemas/UOMCode"
        waste_percent:
          $ref: "#/components/schemas/Rate"
        is_required:
          type: boolean
        is_stock_managed:
          type: boolean
        line_status:
          $ref: "#/components/schemas/FormulaLineStatus"
        note:
          type: string
    CreateFormulaRequest:
      type: object
      required:
        - formula_code
        - finished_item_id
        - finished_sku
        - finished_item_name
        - finished_item_type
        - formula_version
        - batch_qty
        - batch_uom_code
        - base_batch_qty
        - base_batch_uom_code
        - lines
      properties:
        formula_code:
          type: string
        finished_item_id:
          type: string
          description: Must reference an active finished_good or semi_finished item from product master data. SKU, name, and type are resolved from that parent item by the API.
        finished_sku:
          type: string
        finished_item_name:
          type: string
        finished_item_type:
          $ref: "#/components/schemas/ItemType"
        formula_version:
          type: string
        batch_qty:
          $ref: "#/components/schemas/Quantity"
        batch_uom_code:
          $ref: "#/components/schemas/UOMCode"
        base_batch_qty:
          $ref: "#/components/schemas/Quantity"
        base_batch_uom_code:
          $ref: "#/components/schemas/UOMCode"
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateFormulaLineRequest"
        note:
          type: string
    CreateFormulaLineRequest:
      type: object
      required:
        - line_no
        - component_sku
        - component_name
        - component_type
