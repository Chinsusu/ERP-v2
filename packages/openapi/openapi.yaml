openapi: 3.1.0
info:
  title: ERP Platform API
  version: 0.1.0
  license:
    name: Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Get API health
      operationId: getHealth
      security: []
      tags:
        - system
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/mock-login:
    post:
      summary: Create a controlled mock auth session
      operationId: mockLogin
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Mock login accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      tags:
        - auth
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /rbac/roles:
    get:
      summary: List RBAC role catalog
      operationId: listRbacRoles
      tags:
        - auth
      responses:
        "200":
          description: RBAC role catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacRoleCatalogSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /audit-logs:
    get:
      summary: List immutable audit logs
      operationId: listAuditLogs
      tags:
        - audit
      parameters:
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Audit log rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /products:
    get:
      summary: List product master data
      operationId: listProducts
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Product master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /suppliers:
    get:
      summary: List supplier master data
      operationId: listSuppliers
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Supplier master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /customers:
    get:
      summary: List customer master data
      operationId: listCustomers
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Customer master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /warehouses:
    get:
      summary: List warehouse master data
      operationId: listWarehouses
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Warehouse master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /inventory/stock-movements:
    post:
      summary: Record stock movement
      operationId: recordStockMovement
      tags:
        - inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementRequest"
      responses:
        "201":
          description: Stock movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovementSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /inventory/available-stock:
    get:
      summary: List available stock by warehouse, SKU, and batch
      operationId: listAvailableStock
      tags:
        - inventory
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: sku
          in: query
          required: false
          schema:
            type: string
        - name: batch_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Available stock rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableStockSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /warehouse/end-of-day-reconciliations:
    get:
      summary: List warehouse end-of-day reconciliation sessions
      operationId: listEndOfDayReconciliations
      tags:
        - warehouse
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EndOfDayReconciliationStatus"
      responses:
        "200":
          description: End-of-day reconciliation sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndOfDayReconciliationListSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /warehouse/end-of-day-reconciliations/{reconciliation_id}/close:
    post:
      summary: Close a warehouse end-of-day reconciliation session
      operationId: closeEndOfDayReconciliation
      tags:
        - warehouse
      parameters:
        - name: reconciliation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseEndOfDayReconciliationRequest"
      responses:
        "200":
          description: End-of-day reconciliation closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndOfDayReconciliationSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /shipping/manifests:
    get:
      summary: List carrier manifests
      operationId: listCarrierManifests
      tags:
        - shipping
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: carrier_code
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CarrierManifestStatus"
      responses:
        "200":
          description: Carrier manifest rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierManifestListSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    post:
      summary: Create a carrier manifest
      operationId: createCarrierManifest
      tags:
        - shipping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarrierManifestRequest"
      responses:
        "201":
          description: Carrier manifest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierManifestSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /shipping/manifests/{manifest_id}/shipments:
    post:
      summary: Add a packed shipment to a carrier manifest
      operationId: addShipmentToCarrierManifest
      tags:
        - shipping
      parameters:
        - name: manifest_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddShipmentToCarrierManifestRequest"
      responses:
        "200":
          description: Shipment added to carrier manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierManifestSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /shipping/manifests/{manifest_id}/scan:
    post:
      summary: Verify a carrier manifest scan
      operationId: verifyCarrierManifestScan
      tags:
        - shipping
      parameters:
        - name: manifest_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCarrierManifestScanRequest"
      responses:
        "200":
          description: Carrier manifest scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierManifestScanSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /returns/receipts:
    get:
      summary: List return receipts
      operationId: listReturnReceipts
      tags:
        - returns
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReturnReceiptStatus"
      responses:
        "200":
          description: Return receipt rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnReceiptListSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    post:
      summary: Receive a returned order, tracking code, or unknown return case
      operationId: receiveReturn
      tags:
        - returns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveReturnRequest"
      responses:
        "201":
          description: Return receipt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnReceiptSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for page-based pagination.
    PageSizeParam:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of records returned per page.
    SearchParam:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
      description: Quick search term for code, name, phone, or other whitelisted fields.
    MasterDataStatusParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/MasterDataStatus"
      description: Filter by master data lifecycle status.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
    AuthLoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLoginResponse"
    AuthLoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_in:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserProfile"
    MeSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - permissions
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/RoleKey"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacRoleCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacRole"
        request_id:
          type: string
          example: req_lq7z2t9c
    RbacRole:
      type: object
      required:
        - key
        - name
        - permissions
      properties:
        key:
          $ref: "#/components/schemas/RoleKey"
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    AuditLogSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AuditLogItem"
    AuditLogItem:
      type: object
      required:
        - id
        - actor_id
        - action
        - entity_type
        - entity_id
        - metadata
        - created_at
      properties:
        id:
          type: string
        actor_id:
          type: string
        action:
          type: string
          example: inventory.stock_movement.adjusted
        entity_type:
          type: string
          example: inventory.stock_movement
        entity_id:
          type: string
        request_id:
          type: string
        before_data:
          type: object
          additionalProperties: true
        after_data:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    RoleKey:
      type: string
      enum:
        - CEO
        - ERP_ADMIN
        - WAREHOUSE_STAFF
        - WAREHOUSE_LEAD
        - QA
        - SALES_OPS
        - PRODUCTION_OPS
    PermissionKey:
      type: string
      enum:
        - dashboard:view
        - warehouse:view
        - inventory:view
        - purchase:view
        - qc:view
        - production:view
        - sales:view
        - shipping:view
        - returns:view
        - master-data:view
        - approvals:view
        - audit-log:view
        - reports:view
        - settings:view
        - record:create
        - record:export
    Pagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total_items:
          type: integer
          minimum: 0
          example: 245
        total_pages:
          type: integer
          minimum: 0
          example: 13
    MasterDataStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - obsolete
    ProductListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    ProductListItem:
      type: object
      required:
        - id
        - sku_code
        - name
        - item_type
        - uom_code
        - lot_controlled
        - expiry_controlled
        - qc_required
        - status
      properties:
        id:
          type: string
          example: sku_01HXABCDEF
        sku_code:
          type: string
          example: FG-ABC-SER-30-0012
        name:
          type: string
          example: Serum Vitamin C 30ml
        item_type:
          type: string
          enum:
            - raw_material
            - packaging
            - semi_finished
            - finished_good
            - service
        uom_code:
          type: string
          example: PCS
        lot_controlled:
          type: boolean
          example: true
        expiry_controlled:
          type: boolean
          example: true
        qc_required:
          type: boolean
          example: true
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    SupplierListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/SupplierListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    SupplierListItem:
      type: object
      required:
        - id
        - supplier_code
        - supplier_name
        - supplier_group
        - status
      properties:
        id:
          type: string
          example: sup_01HXABCDEF
        supplier_code:
          type: string
          example: SUP-RM-0021
        supplier_name:
          type: string
          example: Nguyen Lieu A Trading
        supplier_group:
          type: string
          enum:
            - raw_material
            - packaging
            - service
            - logistics
            - outsource
        contact_name:
          type: string
          example: Nguyen Van A
        payment_terms:
          type: string
          example: 30D
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    CustomerListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/CustomerListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    CustomerListItem:
      type: object
      required:
        - id
        - customer_code
        - customer_name
        - customer_type
        - status
      properties:
        id:
          type: string
          example: cus_01HXABCDEF
        customer_code:
          type: string
          example: CUS-DL-0009
        customer_name:
          type: string
          example: Dai Ly Minh Anh
        customer_type:
          type: string
          enum:
            - distributor
            - dealer
            - retail_customer
            - marketplace
            - internal_store
        channel_code:
          type: string
          example: B2B
        price_list_code:
          type: string
          example: PL-B2B-2026
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    WarehouseListSuccessResponse:
      type: object
      required:
        - success
        - data
