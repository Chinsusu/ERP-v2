openapi: 3.1.0
info:
  title: ERP Platform API
  version: 0.1.0
  license:
    name: Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Get API health
      operationId: getHealth
      security: []
      tags:
        - system
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/login:
    post:
      summary: Create an authenticated session
      operationId: login
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/mock-login:
    post:
      summary: Create a controlled local auth session
      operationId: mockLogin
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Local login accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/refresh:
    post:
      summary: Refresh an authenticated session
      operationId: refreshAuthSession
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/policy:
    get:
      summary: Get authentication password and lockout policy
      operationId: getAuthPolicy
      security: []
      tags:
        - auth
      responses:
        "200":
          description: Authentication policy
          content:
            application/json:
              schema:
