              $ref: "#/components/schemas/UploadReturnAttachmentRequest"
      responses:
        "201":
          description: Return attachment uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnAttachmentSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for page-based pagination.
    PageSizeParam:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of records returned per page.
    SearchParam:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
      description: Quick search term for code, name, phone, or other whitelisted fields.
    ReportFromDateParam:
      name: from_date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Inclusive report start business date in Asia/Ho_Chi_Minh.
    ReportToDateParam:
      name: to_date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Inclusive report end business date in Asia/Ho_Chi_Minh.
    ReportBusinessDateParam:
      name: business_date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: As-of business date in Asia/Ho_Chi_Minh.
    ReportWarehouseIDParam:
      name: warehouse_id
      in: query
      required: false
      schema:
        type: string
      description: Warehouse identifier filter.
    ReportStatusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
      description: Report status/state filter; blank means all.
    MasterDataStatusParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/MasterDataStatus"
      description: Filter by master data lifecycle status.
    SubcontractOrderIDParam:
      name: subcontract_order_id
      in: path
      required: true
      schema:
        type: string
    SubcontractFactoryDispatchIDParam:
      name: factory_dispatch_id
      in: path
      required: true
      schema:
        type: string
    SubcontractFactoryClaimIDParam:
      name: factory_claim_id
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - BATCH_NOT_SELLABLE
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
    AuthRefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthLogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthLoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLoginResponse"
    AuthLoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
        - refresh_expires_in
        - expires_at
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_in:
          type: integer
          minimum: 1
        refresh_expires_in:
          type: integer
          minimum: 1
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserProfile"
    AuthLogoutSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLogoutResponse"
    AuthLogoutResponse:
      type: object
      required:
        - logged_out
      properties:
        logged_out:
          type: boolean
    AuthPolicySuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthPolicyResponse"
    AuthPolicyResponse:
      type: object
      required:
        - password_min_length
        - password_requires_letter
        - password_requires_number_or_symbol
        - common_passwords_blocked
        - max_failed_attempts
        - lockout_window_seconds
        - lockout_duration_seconds
      properties:
        password_min_length:
          type: integer
          minimum: 1
        password_requires_letter:
          type: boolean
        password_requires_number_or_symbol:
          type: boolean
        common_passwords_blocked:
          type: boolean
        max_failed_attempts:
          type: integer
          minimum: 1
        lockout_window_seconds:
          type: integer
          minimum: 1
        lockout_duration_seconds:
          type: integer
          minimum: 1
    MeSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - permissions
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/RoleKey"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacRoleCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacRole"
        request_id:
          type: string
          example: req_lq7z2t9c
    RbacRole:
      type: object
      required:
        - key
        - name
        - permissions
      properties:
        key:
          $ref: "#/components/schemas/RoleKey"
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacPermissionCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacPermission"
        request_id:
          type: string
          example: req_lq7z2t9c
    RbacPermission:
      type: object
      required:
        - key
        - name
        - group
      properties:
        key:
          $ref: "#/components/schemas/PermissionKey"
        name:
          type: string
        group:
          type: string
          enum:
            - overview
            - operations
            - data
            - control
            - action
    AuditLogSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AuditLogItem"
    AuditLogItem:
      type: object
      required:
        - id
        - actor_id
        - action
        - entity_type
        - entity_id
        - metadata
        - created_at
      properties:
        id:
          type: string
        actor_id:
          type: string
        action:
          type: string
          example: inventory.stock_movement.adjusted
        entity_type:
          type: string
          example: inventory.stock_movement
        entity_id:
          type: string
        request_id:
          type: string
        before_data:
          type: object
          additionalProperties: true
        after_data:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    RoleKey:
      type: string
      enum:
        - CEO
        - ERP_ADMIN
        - WAREHOUSE_STAFF
        - WAREHOUSE_LEAD
        - QA
        - PURCHASE_OPS
        - FINANCE_OPS
        - SALES_OPS
        - PRODUCTION_OPS
    PermissionKey:
      type: string
      enum:
        - dashboard:view
        - warehouse:view
        - inventory:view
        - purchase:view
        - finance:view
        - finance:manage
        - cod:reconcile
        - payment:approve
        - qc:view
        - production:view
        - subcontract:view
        - sales:view
        - shipping:view
        - returns:view
        - master-data:view
        - approvals:view
        - audit-log:view
        - reports:view
        - reports:export
        - reports:finance:view
        - settings:view
        - qc:decision
        - record:create
        - record:export
    Pagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total_items:
          type: integer
          minimum: 0
          example: 245
        total_pages:
          type: integer
          minimum: 0
          example: 13
    MoneyAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,2})?$"
      description: Decimal string for VND money amounts, stored as numeric(18,2).
      example: "1250000.00"
    UnitCostAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,6})?$"
      description: Decimal string for unit cost values, stored as numeric(18,6).
      example: "64000.000000"
    UnitPriceAmount:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,4})?$"
      description: Decimal string for unit price values, stored as numeric(18,4).
      example: "125000.0000"
    Quantity:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,6})?$"
      description: Decimal string for quantities, stored as numeric(18,6).
      example: "10.500000"
    Rate:
      type: string
      pattern: "^[-]?[0-9]+(\\.[0-9]{1,4})?$"
      description: Decimal string for rates or percentages, stored as numeric(9,4).
      example: "10.0000"
    CurrencyCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "^[A-Z]{3}$"
      default: VND
      example: VND
    UOMCode:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "^[A-Z0-9_-]+$"
      example: PCS
    BatchQCStatus:
      type: string
      enum:
        - hold
        - pass
        - fail
        - quarantine
        - retest_required
      description: Batch-level QC status used to decide whether stock may contribute to available quantity.
    BatchStatus:
      type: string
      enum:
        - active
        - inactive
        - blocked
    MasterDataStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - obsolete
    SupplierStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - blacklisted
    SupplierGroup:
      type: string
      enum:
        - raw_material
        - packaging
        - service
        - logistics
        - outsource
    CustomerStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - blocked
    CustomerType:
      type: string
      enum:
        - distributor
        - dealer
        - retail_customer
        - marketplace
        - internal_store
    ItemType:
      type: string
      enum:
        - raw_material
        - packaging
        - semi_finished
        - finished_good
        - service
    WarehouseStatus:
      type: string
      enum:
        - active
        - inactive
    WarehouseType:
      type: string
      enum:
        - raw_material
        - packaging
        - semi_finished
        - finished_good
        - quarantine
        - sample
        - defect
        - retail_store
    LocationStatus:
      type: string
      enum:
        - active
        - inactive
    LocationType:
      type: string
      enum:
        - receiving
        - qc_hold
        - storage
        - pick
        - pack
        - handover
        - return
        - lab
        - scrap
    ProductListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    ProductSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/ProductListItem"
    ProductListItem:
      type: object
      required:
        - id
        - item_code
        - sku_code
        - name
        - item_type
        - uom_code
        - uom_base
        - lot_controlled
        - expiry_controlled
        - qc_required
        - status
        - is_sellable
        - is_purchasable
        - is_producible
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: item-serum-30ml
        item_code:
          type: string
          example: ITEM-SERUM-HYDRA
        sku_code:
          type: string
          example: SERUM-30ML
        name:
          type: string
          example: Hydrating Serum 30ml
        item_type:
          $ref: "#/components/schemas/ItemType"
        item_group:
          type: string
          example: serum
        brand_code:
          type: string
          example: MYH
        uom_code:
          $ref: "#/components/schemas/UOMCode"
        uom_base:
          $ref: "#/components/schemas/UOMCode"
        uom_purchase:
          $ref: "#/components/schemas/UOMCode"
        uom_issue:
          $ref: "#/components/schemas/UOMCode"
        lot_controlled:
          type: boolean
          example: true
        expiry_controlled:
          type: boolean
          example: true
        shelf_life_days:
          type: integer
          minimum: 0
          example: 730
        qc_required:
          type: boolean
          example: true
        status:
          $ref: "#/components/schemas/MasterDataStatus"
        standard_cost:
          $ref: "#/components/schemas/UnitCostAmount"
        is_sellable:
          type: boolean
          example: true
        is_purchasable:
          type: boolean
          example: false
        is_producible:
          type: boolean
          example: true
        spec_version:
          type: string
          example: SPEC-SERUM-2026.04
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        audit_log_id:
          type: string
          example: audit_1777280400000000000
    CreateProductRequest:
      type: object
      required:
        - item_code
        - sku_code
        - name
        - item_type
        - uom_base
      properties:
        item_code:
          type: string
          example: ITEM-MASK-SET
        sku_code:
          type: string
          example: MASK-SET-05
        name:
          type: string
          example: Sheet Mask Set
        item_type:
          $ref: "#/components/schemas/ItemType"
        item_group:
          type: string
          example: mask
        brand_code:
          type: string
          example: MYH
        uom_base:
          $ref: "#/components/schemas/UOMCode"
        uom_purchase:
          $ref: "#/components/schemas/UOMCode"
        uom_issue:
          $ref: "#/components/schemas/UOMCode"
        lot_controlled:
          type: boolean
          default: false
        expiry_controlled:
          type: boolean
          default: false
        shelf_life_days:
          type: integer
          minimum: 0
        qc_required:
          type: boolean
          default: false
        status:
          $ref: "#/components/schemas/MasterDataStatus"
        standard_cost:
          $ref: "#/components/schemas/UnitCostAmount"
        is_sellable:
          type: boolean
          default: false
        is_purchasable:
          type: boolean
          default: false
        is_producible:
          type: boolean
          default: false
        spec_version:
          type: string
    UpdateProductRequest:
      allOf:
        - $ref: "#/components/schemas/CreateProductRequest"
    ChangeProductStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    FormulaStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - archived
    FormulaApprovalStatus:
      type: string
      enum:
        - draft
        - pending_approval
        - approved
        - rejected
    FormulaComponentType:
      type: string
      enum:
        - raw_material
        - fragrance
        - packaging
        - semi_finished
        - service
    FormulaLineStatus:
      type: string
      enum:
        - active
        - excluded
        - needs_review
    FormulaListSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/FormulaListItem"
    FormulaSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/FormulaListItem"
    FormulaListItem:
      type: object
      required:
        - id
        - formula_code
        - finished_item_id
        - finished_sku
        - finished_item_name
        - finished_item_type
        - formula_version
        - batch_qty
        - batch_uom_code
        - base_batch_qty
        - base_batch_uom_code
        - status
        - approval_status
        - lines
        - created_at
        - updated_at
        - version
      properties:
        id:
          type: string
          example: formula-xff-150ml-v1
        formula_code:
          type: string
          example: XFF-150ML
        finished_item_id:
          type: string
          description: Active finished_good or semi_finished item id from product master data.
          example: item-xff-150
        finished_sku:
          type: string
          example: XFF
        finished_item_name:
          type: string
          example: Tinh chat buoi Fast & Furious 150ML
        finished_item_type:
          $ref: "#/components/schemas/ItemType"
        formula_version:
          type: string
          example: v1
        batch_qty:
          $ref: "#/components/schemas/Quantity"
        batch_uom_code:
          $ref: "#/components/schemas/UOMCode"
        base_batch_qty:
          $ref: "#/components/schemas/Quantity"
        base_batch_uom_code:
          $ref: "#/components/schemas/UOMCode"
        status:
          $ref: "#/components/schemas/FormulaStatus"
        approval_status:
          $ref: "#/components/schemas/FormulaApprovalStatus"
        effective_from:
          type: string
          format: date
        effective_to:
