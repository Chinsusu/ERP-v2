          required: false
          schema:
            type: string
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Audit log rows
          content:
            application/json:
              schema:
