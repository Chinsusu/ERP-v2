openapi: 3.1.0
info:
  title: ERP Platform API
  version: 0.1.0
  license:
    name: Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Get API health
      operationId: getHealth
      security: []
      tags:
        - system
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /inventory/stock-movements:
    post:
      summary: Record stock movement
      operationId: recordStockMovement
      tags:
        - inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementRequest"
      responses:
        "201":
          description: Stock movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    StockMovementRequest:
      type: object
      required:
        - movementId
        - sku
        - warehouseId
        - movementType
        - quantity
        - reason
      properties:
        movementId:
          type: string
        sku:
          type: string
        warehouseId:
          type: string
        movementType:
          type: string
          enum:
            - RECEIVE
            - ISSUE
            - TRANSFER_IN
            - ADJUST
        quantity:
          type: number
          exclusiveMinimum: 0
        reason:
          type: string
    SuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        request_id:
          type: string
          example: req_lq7z2t9c
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - request_id
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
              example: Invalid request
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
              example: req_lq7z2t9c
