openapi: 3.1.0
info:
  title: ERP Platform API
  version: 0.1.0
  license:
    name: Proprietary
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Get API health
      operationId: getHealth
      security: []
      tags:
        - system
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/mock-login:
    post:
      summary: Create a controlled mock auth session
      operationId: mockLogin
      security: []
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Mock login accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      tags:
        - auth
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /rbac/roles:
    get:
      summary: List RBAC role catalog
      operationId: listRbacRoles
      tags:
        - auth
      responses:
        "200":
          description: RBAC role catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacRoleCatalogSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /products:
    get:
      summary: List product master data
      operationId: listProducts
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Product master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /suppliers:
    get:
      summary: List supplier master data
      operationId: listSuppliers
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Supplier master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /customers:
    get:
      summary: List customer master data
      operationId: listCustomers
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Customer master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /warehouses:
    get:
      summary: List warehouse master data
      operationId: listWarehouses
      tags:
        - master-data
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/MasterDataStatusParam"
      responses:
        "200":
          description: Warehouse master data list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseListSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /inventory/stock-movements:
    post:
      summary: Record stock movement
      operationId: recordStockMovement
      tags:
        - inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementRequest"
      responses:
        "201":
          description: Stock movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /inventory/available-stock:
    get:
      summary: List available stock by warehouse, SKU, and batch
      operationId: listAvailableStock
      tags:
        - inventory
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: string
        - name: sku
          in: query
          required: false
          schema:
            type: string
        - name: batch_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Available stock rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableStockSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permission is denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current business state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for page-based pagination.
    PageSizeParam:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of records returned per page.
    SearchParam:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
      description: Quick search term for code, name, phone, or other whitelisted fields.
    MasterDataStatusParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/MasterDataStatus"
      description: Filter by master data lifecycle status.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INSUFFICIENT_STOCK
        - INVALID_STATE
    HealthSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.local
        password:
          type: string
          format: password
    AuthLoginSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthLoginResponse"
    AuthLoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum:
            - Bearer
        expires_in:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserProfile"
    MeSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - permissions
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/RoleKey"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RbacRoleCatalogSuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/RbacRole"
        request_id:
          type: string
          example: req_lq7z2t9c
    RbacRole:
      type: object
      required:
        - key
        - name
        - permissions
      properties:
        key:
          $ref: "#/components/schemas/RoleKey"
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionKey"
    RoleKey:
      type: string
      enum:
        - CEO
        - ERP_ADMIN
        - WAREHOUSE_STAFF
        - WAREHOUSE_LEAD
        - QA
        - SALES_OPS
        - PRODUCTION_OPS
    PermissionKey:
      type: string
      enum:
        - dashboard:view
        - warehouse:view
        - inventory:view
        - purchase:view
        - qc:view
        - production:view
        - sales:view
        - shipping:view
        - returns:view
        - master-data:view
        - approvals:view
        - audit-log:view
        - reports:view
        - settings:view
        - record:create
        - record:export
    Pagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total_items:
          type: integer
          minimum: 0
          example: 245
        total_pages:
          type: integer
          minimum: 0
          example: 13
    MasterDataStatus:
      type: string
      enum:
        - draft
        - active
        - inactive
        - obsolete
    ProductListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    ProductListItem:
      type: object
      required:
        - id
        - sku_code
        - name
        - item_type
        - uom_code
        - lot_controlled
        - expiry_controlled
        - qc_required
        - status
      properties:
        id:
          type: string
          example: sku_01HXABCDEF
        sku_code:
          type: string
          example: FG-ABC-SER-30-0012
        name:
          type: string
          example: Serum Vitamin C 30ml
        item_type:
          type: string
          enum:
            - raw_material
            - packaging
            - semi_finished
            - finished_good
            - service
        uom_code:
          type: string
          example: PCS
        lot_controlled:
          type: boolean
          example: true
        expiry_controlled:
          type: boolean
          example: true
        qc_required:
          type: boolean
          example: true
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    SupplierListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/SupplierListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    SupplierListItem:
      type: object
      required:
        - id
        - supplier_code
        - supplier_name
        - supplier_group
        - status
      properties:
        id:
          type: string
          example: sup_01HXABCDEF
        supplier_code:
          type: string
          example: SUP-RM-0021
        supplier_name:
          type: string
          example: Nguyen Lieu A Trading
        supplier_group:
          type: string
          enum:
            - raw_material
            - packaging
            - service
            - logistics
            - outsource
        contact_name:
          type: string
          example: Nguyen Van A
        payment_terms:
          type: string
          example: 30D
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    CustomerListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/CustomerListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    CustomerListItem:
      type: object
      required:
        - id
        - customer_code
        - customer_name
        - customer_type
        - status
      properties:
        id:
          type: string
          example: cus_01HXABCDEF
        customer_code:
          type: string
          example: CUS-DL-0009
        customer_name:
          type: string
          example: Dai Ly Minh Anh
        customer_type:
          type: string
          enum:
            - distributor
            - dealer
            - retail_customer
            - marketplace
            - internal_store
        channel_code:
          type: string
          example: B2B
        price_list_code:
          type: string
          example: PL-B2B-2026
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    WarehouseListSuccessResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/WarehouseListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          example: req_lq7z2t9c
    WarehouseListItem:
      type: object
      required:
        - id
        - warehouse_code
        - warehouse_name
        - warehouse_type
        - site_code
        - allow_sale_issue
        - allow_prod_issue
        - allow_quarantine
        - status
      properties:
        id:
          type: string
          example: wh_01HXABCDEF
        warehouse_code:
          type: string
          example: WH-HCM-FG
        warehouse_name:
          type: string
          example: Finished Goods Warehouse HCM
        warehouse_type:
          type: string
          enum:
            - raw_material
            - packaging
            - semi_finished
            - finished_good
            - quarantine
            - retail_store
        site_code:
          type: string
          example: HCM
        allow_sale_issue:
          type: boolean
          example: true
        allow_prod_issue:
          type: boolean
          example: false
        allow_quarantine:
          type: boolean
          example: false
        status:
          $ref: "#/components/schemas/MasterDataStatus"
    StockMovementRequest:
      type: object
      required:
        - movementId
        - sku
        - warehouseId
        - movementType
        - quantity
        - reason
      properties:
        movementId:
          type: string
        sku:
          type: string
        warehouseId:
          type: string
        movementType:
          type: string
          enum:
            - RECEIVE
            - ISSUE
            - TRANSFER_IN
            - ADJUST
        quantity:
          type: number
          exclusiveMinimum: 0
        reason:
          type: string
    AvailableStockSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AvailableStockItem"
    AvailableStockItem:
      type: object
      required:
        - warehouse_id
        - warehouse_code
        - sku
        - physical_stock
        - reserved_stock
        - hold_stock
        - available_stock
      properties:
        warehouse_id:
          type: string
        warehouse_code:
          type: string
        sku:
          type: string
        batch_id:
          type: string
        batch_no:
          type: string
        physical_stock:
          type: number
        reserved_stock:
          type: number
        hold_stock:
          type: number
        available_stock:
          type: number
    SuccessResponse:
      type: object
      required:
        - success
        - data
        - request_id
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Endpoint-specific response payload.
        request_id:
          type: string
          example: req_lq7z2t9c
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - request_id
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
              example: Invalid request
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
              example: req_lq7z2t9c
