name: migration-ci

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - "apps/api/migrations/**"
      - ".github/workflows/migration-ci.yml"
  pull_request:
    paths:
      - "apps/api/migrations/**"
      - ".github/workflows/migration-ci.yml"

jobs:
  migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations
        env:
          PGPASSWORD: erp
        run: |
          set -euo pipefail
          for migration in $(ls apps/api/migrations/*.up.sql | sort); do
            psql -v ON_ERROR_STOP=1 -h localhost -U erp -d erp -f "$migration"
          done
      - name: Roll back migrations
        env:
          PGPASSWORD: erp
        run: |
          set -euo pipefail
          for migration in $(ls apps/api/migrations/*.down.sql | sort -r); do
            psql -v ON_ERROR_STOP=1 -h localhost -U erp -d erp -f "$migration"
          done
