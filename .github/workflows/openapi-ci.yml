name: openapi-ci

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - "packages/openapi/**"
      - "apps/api/cmd/api/**"
      - ".github/workflows/openapi-ci.yml"
  pull_request:
    paths:
      - "packages/openapi/**"
      - "apps/api/cmd/api/**"
      - ".github/workflows/openapi-ci.yml"

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate OpenAPI
        run: pnpm --package=@redocly/cli dlx redocly lint packages/openapi/openapi.yaml
      - name: Check Sprint 4 contract coverage
        run: pnpm openapi:contract
      - name: Frontend client generate dry run
        run: pnpm dlx openapi-typescript packages/openapi/openapi.yaml -o /tmp/erp-openapi-schema.ts
