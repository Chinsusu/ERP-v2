name: erp-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      S3_BUCKET: erp-local
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb --ignore-existing "local/$$S3_BUCKET"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    image: migrate/migrate:v4.17.1
    profiles:
      - tools
    volumes:
      - ../../apps/api/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -path
      - /migrations
      - -database
      - postgres://erp:erp@postgres:5432/erp?sslmode=disable
      - up

  seed:
    image: postgres:16-alpine
    profiles:
      - tools
    environment:
      PGPASSWORD: erp
    volumes:
      - ../../apps/api/sql/dev_seed.sql:/seed/dev_seed.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - psql
      - -h
      - postgres
      - -U
      - erp
      - -d
      - erp
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /seed/dev_seed.sql

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgres://erp:erp@postgres:5432/erp?sslmode=disable
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      QUEUE_URL: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailhog
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgres://erp:erp@postgres:5432/erp?sslmode=disable
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      QUEUE_URL: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailhog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
