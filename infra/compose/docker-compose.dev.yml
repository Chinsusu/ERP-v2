name: erp-dev

x-api-environment: &api-environment
  APP_ENV: ${APP_ENV:-dev}
  APP_NAME: ${APP_NAME:-erp-platform}
  APP_VERSION: ${APP_VERSION:-dev}
  APP_PORT: ${APP_PORT:-8080}
  DATABASE_URL: ${DATABASE_URL:-postgres://erp_dev:erp_dev@postgres:5432/erp_dev?sslmode=disable}
  DB_HOST: ${DB_HOST:-postgres}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  QUEUE_URL: ${QUEUE_URL:-redis://redis:6379/1}
  JWT_SECRET: ${JWT_SECRET:-change-me-dev-only}
  AUTH_MOCK_EMAIL: ${AUTH_MOCK_EMAIL:-admin@example.local}
  AUTH_MOCK_PASSWORD: ${AUTH_MOCK_PASSWORD:-local-only-mock-password}
  AUTH_MOCK_ACCESS_TOKEN: ${AUTH_MOCK_ACCESS_TOKEN:-local-dev-access-token}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-erp-dev}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_FROM: ${SMTP_FROM:-no-reply-dev@example.local}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-web-environment: &web-environment
  NODE_ENV: production
  HOSTNAME: 0.0.0.0
  PORT: 3000
  NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-dev}
  NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
  NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8088/api/v1}
  NEXT_PUBLIC_MOCK_AUTH_STATE: ${NEXT_PUBLIC_MOCK_AUTH_STATE:-signed-out}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_dev}
      POSTGRES_USER: ${POSTGRES_USER:-erp_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    volumes:
      - minio-data:/data
    logging: *default-logging

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-erp-dev}
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb --ignore-existing "local/$$S3_BUCKET"
    logging: *default-logging

  mailhog:
    image: mailhog/mailhog:v1.0.1
    logging: *default-logging

  migrate:
    image: migrate/migrate:v4.17.1
    profiles:
      - tools
    volumes:
      - ../../apps/api/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -path
      - /migrations
      - -database
      - ${DATABASE_URL:-postgres://erp_dev:erp_dev@postgres:5432/erp_dev?sslmode=disable}
      - up
    logging: *default-logging

  seed:
    image: postgres:16-alpine
    profiles:
      - tools
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-erp_dev}
    volumes:
      - ../../apps/api/sql/dev_seed.sql:/seed/dev_seed.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - psql
      - -h
      - postgres
      - -U
      - ${POSTGRES_USER:-erp_dev}
      - -d
      - ${POSTGRES_DB:-erp_dev}
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /seed/dev_seed.sql
    logging: *default-logging

  api:
    image: ghcr.io/chinsusu/erp-v2-api:${ERP_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  worker:
    image: ghcr.io/chinsusu/erp-v2-worker:${ERP_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    logging: *default-logging

  web:
    image: ghcr.io/chinsusu/erp-v2-web:${ERP_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-dev}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8088/api/v1}
        NEXT_PUBLIC_MOCK_AUTH_STATE: ${NEXT_PUBLIC_MOCK_AUTH_STATE:-signed-out}
    environment: *web-environment
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_HTTP_PORT:-8088}:8080"
    volumes:
      - ../nginx/dev-staging.conf:/etc/nginx/nginx.conf:ro
      - access-logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  smoke:
    image: curlimages/curl:8.11.1
    profiles:
      - smoke
    depends_on:
      reverse-proxy:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        curl -fsS http://reverse-proxy:8080/healthz &&
        curl -fsS http://reverse-proxy:8080/api/v1/health &&
        curl -fsS http://reverse-proxy:8080/
    logging: *default-logging

volumes:
  postgres-data:
  minio-data:
  access-logs:
